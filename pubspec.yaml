name: gridwise
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0
  google_sign_in: ^6.2.1

  # UI / Charts
  fl_chart: ^0.69.0
  shimmer: ^3.0.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1
  share_plus: ^10.0.2
  screenshot: ^3.0.0
  google_fonts: ^8.0.2
  http: ^1.5.0
  socket_io_client: ^3.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/google_logo.png

